services:
  db:
    image: mysql
    container_name: MySql

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: $(MYSQL_PASS)
      MYSQL_DATABASE: ${MYSQL_NAME}

    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:

